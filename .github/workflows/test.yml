name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install tools
        run: brew install xcodegen swiftformat swiftlint

      - name: Lint
        run: make lint

      - name: Generate project
        run: xcodegen generate

      - name: Test
        run: make test AGENT_NAME=ci

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/logs/
          if-no-files-found: ignore
